name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

# npm install statt npm ci: Lock-File wird von Bolt kontinuierlich überschrieben,
# wodurch package-lock.json und package.json divergieren. Dies ist ein
# dokumentierter Workaround (C6.5 in docs/C6-SCOPE.md). Langfrist-Lösung
# nach Klärung der Bolt-Integration (C6-Arbeitsphase).

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install
      - run: npm run typecheck

  unit-backend:
    name: Backend-Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install
      - run: npm run test:server

  unit-frontend:
    name: Frontend-Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install
      - run: npm run test:ui

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install
      - run: npm run build

  e2e:
    name: E2E-Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [typecheck, unit-backend, unit-frontend, build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm install
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox
      - name: Run E2E-Tests
        run: npm run test:e2e
        env:
          CI: 'true'
      - name: Upload Playwright-Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
      - name: Upload Test-Traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
